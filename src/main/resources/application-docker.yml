server:
  port: 8080

spring:
  application:
    name: identity-service

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  server:
    port: ${MANAGEMENT_PORT:8081}
    address: 127.0.0.1

logging:
  level:
    root: INFO
    com.tfm.bandas.identity: DEBUG
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_URL}
  realm: ${KEYCLOAK_REALM}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
  permitted-roles: ${KEYCLOAK_PERMITTED_ROLES}